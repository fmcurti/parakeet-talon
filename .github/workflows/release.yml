name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.plat }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            plat: macos-aarch64
            archive: tar
          - os: macos-13
            target: x86_64-apple-darwin
            plat: macos-x86_64
            archive: tar
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            plat: linux-x86_64
            archive: tar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            plat: windows-x86_64
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar-rs/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('sidecar-rs/Cargo.lock') }}

      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Build workspace (both sidecars)
        working-directory: sidecar-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar)
        if: matrix.archive == 'tar'
        working-directory: sidecar-rs/target/${{ matrix.target }}/release
        run: |
          for bin in parakeet-sidecar qwen-sidecar; do
            asset="${bin}-${{ matrix.plat }}.tar.gz"
            tar czf "$asset" "$bin"
            shasum -a 256 "$asset" > "$asset.sha256"
          done

      - name: Package (zip)
        if: matrix.archive == 'zip'
        working-directory: sidecar-rs/target/${{ matrix.target }}/release
        shell: pwsh
        run: |
          foreach ($bin in @("parakeet-sidecar", "qwen-sidecar")) {
            $asset = "$bin-${{ matrix.plat }}.zip"
            Compress-Archive -Path "$bin.exe" -DestinationPath $asset
            $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLower()
            "$hash  $asset" | Out-File -Encoding ascii "$asset.sha256"
          }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            sidecar-rs/target/${{ matrix.target }}/release/*-sidecar-${{ matrix.plat }}.tar.gz
            sidecar-rs/target/${{ matrix.target }}/release/*-sidecar-${{ matrix.plat }}.tar.gz.sha256
            sidecar-rs/target/${{ matrix.target }}/release/*-sidecar-${{ matrix.plat }}.zip
            sidecar-rs/target/${{ matrix.target }}/release/*-sidecar-${{ matrix.plat }}.zip.sha256
          fail_on_unmatched_files: false
          generate_release_notes: true

      - name: Upload artifacts (non-tag runs)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/v')"
        with:
          name: sidecars-${{ matrix.plat }}
          path: |
            sidecar-rs/target/${{ matrix.target }}/release/*-sidecar-${{ matrix.plat }}.tar.gz*
            sidecar-rs/target/${{ matrix.target }}/release/*-sidecar-${{ matrix.plat }}.zip*
